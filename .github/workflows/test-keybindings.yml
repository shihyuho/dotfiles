name: Test Keybindings

on:
  push:
    paths:
      - 'config/ghostty/**'
      - 'scripts/test-keybindings.sh'
      - '.github/workflows/test-keybindings.yml'
  pull_request:
    paths:
      - 'config/ghostty/**'
      - 'scripts/test-keybindings.sh'
  workflow_dispatch:

jobs:
  test-configs:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test Ghostty Config Syntax
        run: |
          bash scripts/test-keybindings.sh ghostty
      
      - name: Generate Test Report
        if: always()
        run: |
          bash scripts/test-keybindings.sh report
